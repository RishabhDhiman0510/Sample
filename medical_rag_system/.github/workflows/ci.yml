name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install ruff mypy black && pip install -e ".[dev]"
      - run: black --check medical_rag tests
      - run: ruff check medical_rag tests
      - run: mypy medical_rag --ignore-missing-imports
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=medical_rag --cov-report=xml -v
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
